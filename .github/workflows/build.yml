name: Build MOD APK

on:
  workflow_dispatch:
    inputs:
      apk_url:
        description: 'Original APK download URL'
        required: true
        default: 'https://your-storage.com/jaiho91_prosafebet.apk'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Download original APK
      run: |
        curl -sL -o original.apk "${{ github.event.inputs.apk_url }}"
        ls -lh original.apk

    - name: Setup keystore
      env:
        KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
      run: |
        if [ -n "$KEYSTORE_B64" ]; then
          echo "$KEYSTORE_B64" | base64 -d > keystore.jks
        fi

    - name: Install apktool
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq wget curl unzip
        mkdir -p tools
        wget -q -O tools/apktool.jar https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar
        wget -q -O tools/signer.jar https://github.com/patrickfav/uber-apk-signer/releases/download/v1.3.0/uber-apk-signer-1.3.0.jar

    - name: Build MOD APK
      env:
        NEW_PACKAGE: ${{ secrets.NEW_PACKAGE }}
        NEW_APP_NAME: ${{ secrets.NEW_APP_NAME }}
        KS_ALIAS: ${{ secrets.KEY_ALIAS }}
        KS_PASS: ${{ secrets.KEYSTORE_PASS }}
        KEY_PASS: ${{ secrets.KEY_PASS }}
      run: |
        if [ -z "$NEW_PACKAGE" ]; then
          echo "NEW_PACKAGE=com.yourbrand.casino" >> $GITHUB_ENV
          NEW_PACKAGE="com.yourbrand.casino"
        fi
        if [ -z "$NEW_APP_NAME" ]; then
          echo "NEW_APP_NAME=My Casino" >> $GITHUB_ENV
          NEW_APP_NAME="My Casino"
        fi
        
        chmod +x build.sh
        ./build.sh original.apk "$NEW_PACKAGE" "$NEW_NAME"
        echo "MOD_FILE=$(ls build_*/My_Casino_MOD.apk 2>/dev/null || ls build_/*MOD*)" >> $GITHUB_ENV

    - name: Upload MOD APK
      uses: actions/upload-artifact@v4
      with:
        name: MOD-APK
        path: build_*/*MOD*.apk
        if-no-files-found: error
